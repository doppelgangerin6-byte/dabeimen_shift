    <meta name="apple-mobile-web-app-capable" content="yes">

</head>

                        <span id="morning-status-tag" class="text-[10px] font-bold px-2 py-0.5 rounded bg-green-50 text-green-600">🟢 上班中</span>
                    </div>
                    <hr class="border-[#EDF2F7] mb-2">
                    <div id="morning-staff-list" class="flex flex-col gap-2">
                        <!-- 動態載入 -->
                    </div>
                </div>
                
                <!-- 晚班卡片 -->
                <div class="bg-white border border-[#E2E8F0] rounded-2xl p-4 shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-bold text-[#1A1D20]">🌙 晚班同仁 (17:30)</span>
                        <span id="evening-status-tag" class="text-[10px] font-bold px-2 py-0.5 rounded bg-orange-50 text-orange-500">🌙 預備中</span>
                    </div>
                    <hr class="border-[#EDF2F7] mb-2">
                    <div id="evening-staff-list" class="flex flex-col gap-2">
                        <!-- 動態載入 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 頁面 2：月曆總覽 ================= -->

            </div>
            <div id="calendar-board-list" class="flex flex-col gap-3 flex-1 overflow-y-auto no-scrollbar">
                <!-- 動態載入大卡片 -->
            </div>
        </div>

            return `(${list[index]})`;
        }

        // 🟢 單日智慧感知時間狀態邏輯
        function updateSmartStatus(day) {
            const now = new Date();
            const today = now.getDate();
            const hour = now.getHours();
            
            const morningTag = document.getElementById("morning-status-tag");
            const eveningTag = document.getElementById("evening-status-tag");
            
            if (day < today) {
                setTag(morningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                setTag(eveningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
            } else if (day > today) {
                setTag(morningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                setTag(eveningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
            } else {
                // 今天的情況
                if (hour < 8) {
                    setTag(morningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                } else if (hour >= 8 && hour < 17) {
                    setTag(morningTag, "🟢 上班中", "bg-green-50 text-green-600");
                } else {
                    setTag(morningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                }
                
                if (hour < 17) {
                    setTag(eveningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                } else if (hour >= 17 && hour <= 23) {
                    setTag(eveningTag, "🟢 上班中", "bg-green-50 text-green-600");
                } else {
                    setTag(eveningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                }
            }
        }

        function setTag(el, text, className) {
            el.innerText = text;
            el.className = `text-[10px] font-bold px-2 py-0.5 rounded ${className}`;
        }

        // 🗓️ 渲染單日名單與小卡片

            updateSmartStatus(day);

            const slider = document.getElementById("date-slider");
            slider.innerHTML = "";
            for (let i = 1; i <= 30; i++) {
                const isSelected = i === day;
                const div = document.createElement("div");
                div.className = `flex flex-col items-center justify-center min-w-[55px] h-[55px] rounded-xl border cursor-pointer transition-all ${isSelected ? 'bg-[#1A1D20] border-[#1A1D20] text-white shadow-md' : 'bg-white border-[#E2E8F0] text-[#2D3748]'}`;

                div.innerHTML = `<span class="text-base font-bold ${isSelected ? 'text-[#F5C144]' : ''}">${i}</span><span class="text-[9px] ${isSelected ? 'text-white/70' : 'text-gray-400'} font-bold">${getWeekdayString(i)}</span>`;
                slider.appendChild(div);
                if (isSelected && !dayInitiated) {
                    setTimeout(() => div.scrollIntoView({ behavior: 'smooth', inline: 'center' }), 100);
                }
            }
            dayInitiated = true;

            const eveningList = document.getElementById("evening-staff-list");
            morningList.innerHTML = ""; eveningList.innerHTML = "";

            const morningData = globalMonthlyShifts[day]["早班"];
            const eveningData = globalMonthlyShifts[day]["晚班"];

                morningList.innerHTML = `<p class="text-xs text-gray-400 py-1">今日無人排班 / 休假</p>`;
            } else {
                morningData.forEach(p => {
                    morningList.innerHTML += `<div class="flex justify-between text-sm"><span class="font-bold text-[#2D3748]">${p.name}</span><span class="text-xs text-gray-500 font-medium">${p.hours}</span></div>`;
                });
            }

            if (eveningData.length === 0) {
                eveningList.innerHTML = `<p class="text-xs text-gray-400 py-1">今日無人排班 / 休假</p>`;
            } else {
                eveningData.forEach(p => {
                    eveningList.innerHTML += `<div class="flex justify-between text-sm"><span class="font-bold text-[#2D3748]">${p.name}</span><span class="text-xs text-gray-500 font-medium">${p.hours}</span></div>`;
                });
            }
        }

        // 📅 渲染月曆大看板頁面
        function renderCalendarPage() {
            const board = document.getElementById("calendar-board-list");
            board.innerHTML = "";
            const today = new Date().getDate();

            for (let i = 1; i <= 30; i++) {
                const isToday = i === today;
                const early = globalMonthlyShifts[i]["早班"].map(e => e.name);
                const late = globalMonthlyShifts[i]["晚班"].map(e => e.name);

                board.innerHTML += `
                    <div class="bg-white rounded-2xl border ${isToday ? 'border-[#1A1D20] ring-1 ring-[#1A1D20]' : 'border-[#E2E8F0]'} flex min-h-[65px] shadow-sm overflow-hidden">
                        <div class="w-16 ${isToday ? 'bg-[#1A1D20]' : 'bg-[#F8F9FA]'} flex flex-col justify-center items-center">
                            <span class="text-lg font-black ${isToday ? 'text-[#F5C144]' : 'text-[#1A1D20]'}">${i}</span>
                            <span class="text-[10px] font-bold ${isToday ? 'text-white/70' : 'text-gray-400'}">${getWeekdayString(i)}</span>
                        </div>
                        <div class="flex-1 p-3 flex gap-2 items-center">
                            <div class="flex-1">
                                <div class="flex items-center gap-1.5 mb-1"><i class="fa-solid fa-sun text-amber-500 text-xs"></i><span class="text-[10px] font-bold text-gray-400">早班</span></div>
                                <p class="text-xs font-bold text-[#2D3748] truncate">${early.length ? early.join('、') : '無人排班'}</p>
                            </div>
                            <div class="w-[1px] h-8 bg-gray-100"></div>
                            <div class="flex-1 pl-2">
                                <div class="flex items-center gap-1.5 mb-1"><i class="fa-solid fa-moon text-indigo-500 text-xs"></i><span class="text-[10px] font-bold text-gray-400">晚班</span></div>
                                <p class="text-xs font-bold text-[#2D3748] truncate">${late.length ? late.join('、') : '無人排班'}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // 📊 渲染全時段精緻統計頁面
        function renderSummaryPage() {
            const container = document.getElementById("employee-summary-list");
            container.innerHTML = "";

            employeeStats.forEach(emp => {
                let chipsHtml = "";
                chipsHtml += makeChips("全日休", emp.fullLeaves, "bg-red-50 border-red-100 text-red-500", "fa-event-busy");
                chipsHtml += makeChips("早班休", emp.morningLeaves, "bg-amber-50 border-amber-100 text-amber-600", "fa-wb-twilight");
                chipsHtml += makeChips("晚班休", emp.eveningLeaves, "bg-blue-50 border-blue-100 text-blue-600", "fa-nights-stay");

                container.innerHTML += `
                    <div class="bg-white rounded-2xl border border-[#E2E8F0] p-4 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-base font-black text-[#1A1D20]">${emp.name}</span>
                            <span class="bg-[#1A1D20] text-[#F5C144] text-xs font-black px-2.5 py-1 rounded-lg">${emp.totalHours} 小時</span>
                        </div>
                        <hr class="border-[#EDF2F7] mb-3">
                        <div class="flex flex-col gap-3">${chipsHtml}</div>
                    </div>
                `;
            });
        }

        function makeChips(title, days, colorClass, icon) {
            if (!days || days.length === 0) return "";
            const items = days.map(d => `<span class="px-2 py-0.5 rounded-md text-[10px] font-bold border ${colorClass}">${d}號</span>`).join('');
            return `
                <div>
                    <div class="text-[11px] font-bold text-gray-400 mb-1.5 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${colorClass.split(' ')[2]}"></span>${title} (共 ${days.length} 天)</div>
                    <div class="flex flex-wrap gap-1.5">${items}</div>
                </div>
            `;
        }

        // 🔄 頁面切換控制
        function switchPage(page) {
            document.getElementById("page-daily").classList.add("hidden");
            document.getElementById("page-calendar").classList.add("hidden");
            document.getElementById("page-summary").classList.add("hidden");
            
            document.getElementById("nav-daily").className = "flex flex-col items-center gap-1 text-gray-400";
            document.getElementById("nav-calendar").className = "flex flex-col items-center gap-1 text-gray-400";
            document.getElementById("nav-summary").className = "flex flex-col items-center gap-1 text-gray-400";

            if (page === 'daily') {
                document.getElementById("page-daily").classList.remove("hidden");
                document.getElementById("nav-daily").className = "flex flex-col items-center gap-1 text-[#1A1D20]";
                dayInitiated = false;
                renderDailyPage(currentSelectedDay);
            } else if (page === 'calendar') {
                document.getElementById("page-calendar").classList.remove("hidden");
                document.getElementById("nav-calendar").className = "flex flex-col items-center gap-1 text-[#1A1D20]";
                renderCalendarPage();
            } else if (page === 'summary') {
                document.getElementById("page-summary").classList.remove("hidden");
                document.getElementById("nav-summary").className = "flex flex-col items-center gap-1 text-[#1A1D20]";
                renderSummaryPage();
            }
        }

        // 初始化
        let dayInitiated = false;
        renderDailyPage(currentSelectedDay);
    </script>
</body>
</html>
