            const list = ["一", "二", "三", "四", "五", "六", "日"];
            const startIdx = startWeekdays[month] || 0;
            const index = (startIdx + day - 1) % 7;
            return `(${list[index]})`;
        }

            if (appData[month] && appData[month].shifts && appData[month].shifts[day]) {
                return appData[month].shifts[day];
            }
            return { "早班": [], "晚班": [] };
        }

        function updateSmartStatus(day) {
            const now = new Date();
            const realMonth = now.getMonth() + 1;
            const today = now.getDate();
            const hour = now.getHours();
            const morningTag = document.getElementById("morning-status-tag");
            const eveningTag = document.getElementById("evening-status-tag");
            
            if (currentMonth < realMonth) {
                setTag(morningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                setTag(eveningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                return;
            } else if (currentMonth > realMonth) {
                setTag(morningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                setTag(eveningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                return;
            }

            if (day < today) {
                setTag(morningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                setTag(eveningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
            } else if (day > today) {
                setTag(morningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                setTag(eveningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
            } else {
                if (hour < 8) setTag(morningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                else if (hour >= 8 && hour < 17) setTag(morningTag, "🟢 上班中", "bg-green-50 text-green-600");
                else setTag(morningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
                
                if (hour < 17) setTag(eveningTag, "🌙 預備中", "bg-orange-50 text-orange-500");
                else if (hour >= 17 && hour <= 23) setTag(eveningTag, "🟢 上班中", "bg-green-50 text-green-600");
                else setTag(eveningTag, "⚪ 已下班", "bg-gray-100 text-gray-500");
            }
        }

        function setTag(el, text, className) {
            el.innerText = text;
            el.className = `text-[10px] font-bold px-2 py-0.5 rounded ${className}`;
        }

        function initEmployeeFilter() {
            const filterSelect = document.getElementById("employee-filter");
            filterSelect.innerHTML = '<option value="all">所有人員</option>';
            const names = new Set();
            if (appData[currentMonth].stats) {
                appData[currentMonth].stats.forEach(emp => names.add(emp.name));
            }
            names.forEach(name => {
                filterSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
            filterSelect.value = currentEmployeeFilter;
        }

        function switchMonth(month) {
            // 🌟 新增：切換月份震動回饋
            if (navigator.vibrate) navigator.vibrate(30);

            currentMonth = parseInt(month);
            currentEmployeeFilter = 'all';
            dayInitiated = false; 

            if (currentSelectedDay > appData[currentMonth].days) currentSelectedDay = 1;
            if (calendarSelectedDay > appData[currentMonth].days) calendarSelectedDay = 1;

            document.getElementById("calendar-title-month").innerText = `${currentMonth}月 班表日曆`;
            document.getElementById("summary-title-month").innerText = `${currentMonth}月 同仁出勤統計`;

            initEmployeeFilter();
            renderDailyPage(currentSelectedDay);
            renderCalendarPage();
            renderSummaryPage();
        }

        function filterEmployee(empName) {
            // 🌟 新增：切換濾鏡震動回饋
            if (navigator.vibrate) navigator.vibrate(30);
            
            currentEmployeeFilter = empName;
            renderCalendarPage();
        }

        function renderDailyPage(day) {
            currentSelectedDay = day;
            document.getElementById("daily-title-date").innerText = `${currentMonth}月${day}日 ${getWeekdayString(currentMonth, day)}`;
            updateSmartStatus(day);
            
            const slider = document.getElementById("date-slider");
            slider.innerHTML = "";
            const daysInMonth = appData[currentMonth].days;

            for (let i = 1; i <= daysInMonth; i++) {
                const isSelected = i === day;
                const div = document.createElement("div");
                div.className = `flex flex-col items-center justify-center min-w-[55px] h-[55px] rounded-xl border cursor-pointer transition-all ${isSelected ? 'bg-[#1A1D20] border-[#1A1D20] text-white shadow-md' : 'bg-white border-[#E2E8F0] text-[#2D3748]'}`;
                
                div.onclick = () => {
                    // 🌟 新增：單日排班日期切換震動回饋
                    if (navigator.vibrate) navigator.vibrate(30);
                    renderDailyPage(i);
                };

                div.innerHTML = `<span class="text-base font-bold ${isSelected ? 'text-[#F5C144]' : ''}">${i}</span><span class="text-[9px] ${isSelected ? 'text-white/70' : 'text-gray-400'} font-bold">${getWeekdayString(currentMonth, i)}</span>`;
                slider.appendChild(div);
                if (isSelected && !dayInitiated) {
                    setTimeout(() => div.scrollIntoView({ behavior: 'smooth', inline: 'center' }), 100);
                }
            }
            dayInitiated = true;

            const morningList = document.getElementById("morning-staff-list");
            const eveningList = document.getElementById("evening-staff-list");
            morningList.innerHTML = ""; eveningList.innerHTML = "";

            const shiftData = getShiftData(currentMonth, day);
            const morningData = shiftData["早班"];
            const eveningData = shiftData["晚班"];

            if (morningData.length === 0) morningList.innerHTML = `<p class="text-xs text-gray-400 py-1">今日無人排班 / 休假</p>`;
            else morningData.forEach(p => morningList.innerHTML += `<div class="flex justify-between text-sm"><span class="font-bold text-[#2D3748]">${p.name}</span><span class="text-xs text-gray-500 font-medium">${p.hours}</span></div>`);

            if (eveningData.length === 0) eveningList.innerHTML = `<p class="text-xs text-gray-400 py-1">今日無人排班 / 休假</p>`;
            else eveningData.forEach(p => eveningList.innerHTML += `<div class="flex justify-between text-sm"><span class="font-bold text-[#2D3748]">${p.name}</span><span class="text-xs text-gray-500 font-medium">${p.hours}</span></div>`);
        }

        function renderCalendarPage() {
            const grid = document.getElementById("calendar-grid");
            grid.innerHTML = "";

            const startIdx = startWeekdays[currentMonth] || 0;
            for(let i=0; i<startIdx; i++) {
                grid.innerHTML += `<div></div>`;
            }

            const daysInMonth = appData[currentMonth].days;
            for (let i = 1; i <= daysInMonth; i++) {
                const shiftData = getShiftData(currentMonth, i);
                const isSelected = i === calendarSelectedDay;

                let hasEarly = false;
                let hasLate = false;

                if (currentEmployeeFilter === 'all') {
                    hasEarly = shiftData["早班"].length > 0;
                    hasLate = shiftData["晚班"].length > 0;
                } else {
                    hasEarly = shiftData["早班"].some(e => e.name === currentEmployeeFilter);
                    hasLate = shiftData["晚班"].some(e => e.name === currentEmployeeFilter);
                }

                const isFilteredWorking = (currentEmployeeFilter !== 'all') && (hasEarly || hasLate);
                const styleClass = isSelected ? 'border-[#1A1D20] bg-[#1A1D20] text-white shadow-md' : 
                                  (isFilteredWorking ? 'border-amber-400 bg-amber-50 text-[#2D3748]' : 'border-transparent bg-gray-50 text-[#2D3748] hover:border-gray-200');

                grid.innerHTML += `
                    <div onclick="selectCalendarDay(${i})" class="cursor-pointer aspect-square flex flex-col items-center justify-center rounded-xl border-2 ${styleClass} transition-all">
                        <span class="text-sm font-bold">${i}</span>
                        <div class="flex gap-1 mt-0.5">
                            ${hasEarly ? `<span class="w-1.5 h-1.5 rounded-full ${isFilteredWorking ? 'bg-amber-500' : 'bg-amber-400'}"></span>` : '<span class="w-1.5 h-1.5 rounded-full bg-transparent"></span>'}
                            ${hasLate ? `<span class="w-1.5 h-1.5 rounded-full ${isFilteredWorking ? 'bg-indigo-500' : 'bg-indigo-400'}"></span>` : '<span class="w-1.5 h-1.5 rounded-full bg-transparent"></span>'}
                        </div>
                    </div>
                `;
            }
            updateCalendarDetail(calendarSelectedDay);
        }

        // 🌟 更新版：點擊月曆時有微震動 + 自動平滑捲動
        function selectCalendarDay(day) {
            calendarSelectedDay = day;
            renderCalendarPage();
            
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
            
            setTimeout(() => {
                const detailCard = document.getElementById("calendar-detail-card");
                if (detailCard) {
                    detailCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 50);
        }

        function updateCalendarDetail(day) {
            const detailContainer = document.getElementById("calendar-detail-card");
            const shiftData = getShiftData(currentMonth, day);

            let titleText = `${currentMonth}月${day}日 出勤名單`;
            let earlyHtml = '';
            let lateHtml = '';

            if (currentEmployeeFilter === 'all') {
                const early = shiftData["早班"].map(e => e.name);
                const late = shiftData["晚班"].map(e => e.name);
                earlyHtml = `<p class="text-sm font-bold text-[#2D3748] leading-relaxed">${early.length ? early.join('<br>') : '<span class="text-gray-400 font-normal">無班</span>'}</p>`;
                lateHtml = `<p class="text-sm font-bold text-[#2D3748] leading-relaxed">${late.length ? late.join('<br>') : '<span class="text-gray-400 font-normal">無班</span>'}</p>`;
            } else {
                titleText = `<span class="text-[#1A1D20]">${currentMonth}月${day}日</span> <span class="text-amber-600 ml-1 font-black">${currentEmployeeFilter} 專屬班表</span>`;

                const myEarly = shiftData["早班"].find(e => e.name === currentEmployeeFilter);
                const myLate = shiftData["晚班"].find(e => e.name === currentEmployeeFilter);
                
                const otherEarly = shiftData["早班"].filter(e => e.name !== currentEmployeeFilter).map(e => e.name);
                const otherLate = shiftData["晚班"].filter(e => e.name !== currentEmployeeFilter).map(e => e.name);

                earlyHtml = myEarly
                    ? `<p class="text-sm font-black text-[#2D3748]">${myEarly.hours}</p>`
                    : `<p class="text-sm font-bold text-gray-400">休假 🏖️</p>`;
                if (otherEarly.length > 0) earlyHtml += `<div class="mt-2 pt-1.5 border-t border-amber-100"><p class="text-[10px] text-gray-400 font-medium">搭檔: ${otherEarly.join(', ')}</p></div>`;

                lateHtml = myLate
                    ? `<p class="text-sm font-black text-[#2D3748]">${myLate.hours}</p>`
                    : `<p class="text-sm font-bold text-gray-400">休假 🏖️</p>`;
                if (otherLate.length > 0) lateHtml += `<div class="mt-2 pt-1.5 border-t border-blue-100"><p class="text-[10px] text-gray-400 font-medium">搭檔: ${otherLate.join(', ')}</p></div>`;
            }

            detailContainer.innerHTML = `
                <div class="bg-white rounded-2xl border border-[#E2E8F0] p-4 shadow-sm animate-fade-in" key="${currentMonth}-${day}-${currentEmployeeFilter}">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-base font-black text-[#1A1D20]">${titleText}</span>
                        <span class="text-[10px] font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded">${getWeekdayString(currentMonth, day)}</span>
                    </div>
                    <hr class="border-[#EDF2F7] mb-3">
                    <div class="flex gap-3">
                        <div class="flex-1 bg-[#FFFDF5] rounded-xl p-3 border border-amber-100 flex flex-col">
                            <div class="flex items-center gap-1.5 mb-2">
                                <i class="fa-solid fa-sun text-amber-500 text-sm"></i>
                                <span class="text-xs font-bold text-gray-500">早班</span>
                            </div>
                            <div class="flex-1">${earlyHtml}</div>
                        </div>
                        <div class="flex-1 bg-[#F0F7FF] rounded-xl p-3 border border-blue-100 flex flex-col">
                            <div class="flex items-center gap-1.5 mb-2">
                                <i class="fa-solid fa-moon text-indigo-500 text-sm"></i>
                                <span class="text-xs font-bold text-gray-500">晚班</span>
                            </div>
                            <div class="flex-1">${lateHtml}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSummaryPage() {
            const container = document.getElementById("employee-summary-list");
            container.innerHTML = "";
            const statsData = appData[currentMonth].stats;

            if (!statsData || statsData.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-400 text-center py-10">本月份尚無統計資料</p>`;
                return;
            }

            statsData.forEach(emp => {
                let chipsHtml = "";
                chipsHtml += makeChips("全日休", emp.fullLeaves, "bg-red-50 border-red-100 text-red-500");
                chipsHtml += makeChips("早班休", emp.morningLeaves, "bg-amber-50 border-amber-100 text-amber-600");
                chipsHtml += makeChips("午班休", emp.midLeaves, "bg-green-50 border-green-100 text-green-600");
                chipsHtml += makeChips("晚班休", emp.eveningLeaves, "bg-blue-50 border-blue-100 text-blue-600");

                container.innerHTML += `
                    <div class="bg-white rounded-2xl border border-[#E2E8F0] p-4 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-base font-black text-[#1A1D20]">${emp.name}</span>
                            <span class="bg-[#1A1D20] text-[#F5C144] text-xs font-black px-2.5 py-1 rounded-lg">${emp.totalHours} 小時</span>
                        </div>
                        <hr class="border-[#EDF2F7] mb-3">
                        <div class="flex flex-col gap-3">${chipsHtml}</div>
                    </div>
                `;
            });
        }

        function makeChips(title, days, colorClass) {
            if (!days || days.length === 0) return "";
            const items = days.map(d => `<span class="px-2 py-0.5 rounded-md text-[10px] font-bold border ${colorClass}">${d}號</span>`).join('');
            return `
                <div>
                    <div class="text-[11px] font-bold text-gray-400 mb-1.5 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${colorClass.split(' ')[2]}"></span>${title} (共 ${days.length} 天)</div>
                    <div class="flex flex-wrap gap-1.5">${items}</div>
                </div>
            `;
        }

        function switchPage(page) {
            // 🌟 新增：底部導覽列切換震動回饋
            if (navigator.vibrate) navigator.vibrate(30);

            document.getElementById("page-daily").classList.add("hidden");
            document.getElementById("page-calendar").classList.add("hidden");
            document.getElementById("page-summary").classList.add("hidden");
            
            document.getElementById("nav-daily").className = "flex flex-col items-center gap-1 text-gray-400";
            document.getElementById("nav-calendar").className = "flex flex-col items-center gap-1 text-gray-400";
            document.getElementById("nav-summary").className = "flex flex-col items-center gap-1 text-gray-400";

            if (page === 'daily') {
                document.getElementById("page-daily").classList.remove("hidden");
                document.getElementById("nav-daily").className = "flex flex-col items-center gap-1 text-[#1A1D20]";
                dayInitiated = false;
                renderDailyPage(currentSelectedDay);
            } else if (page === 'calendar') {
                document.getElementById("page-calendar").classList.remove("hidden");
                document.getElementById("nav-calendar").className = "flex flex-col items-center gap-1 text-[#1A1D20]";
                renderCalendarPage();
            } else if (page === 'summary') {
                document.getElementById("page-summary").classList.remove("hidden");
                document.getElementById("nav-summary").className = "flex flex-col items-center gap-1 text-[#1A1D20]";
                renderSummaryPage();
            }
        }

        initEmployeeFilter();
        renderDailyPage(currentSelectedDay);
    </script>
</body>
</html>
